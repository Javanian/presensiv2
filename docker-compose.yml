services:
  db:
    image: pgvector/pgvector:pg16
    container_name: presensiv2_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: presensiv2
      POSTGRES_PASSWORD: presensiv2pass
      POSTGRES_DB: presensiv2
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presensiv2 -d presensiv2"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: presensiv2_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost:8080","http://localhost:8000","http://100.85.26.99:8000","http://100.85.26.99:5173","http://100.85.26.99:19000","http://100.85.26.99:8081"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    image: node:20-alpine
    container_name: presensiv2_web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://100.85.26.99:8000
      - VITE_APP_NAME=Presensi Online SSB v2
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - backend

  expo:
    build: ./mobile
    container_name: presensiv2_expo
    restart: unless-stopped
    network_mode: host     # share host network — Metro detects Tailscale IP directly
    command: npx expo start --lan
    environment:
      - REACT_NATIVE_PACKAGER_HOSTNAME=100.85.26.99
      - EXPO_PUBLIC_API_BASE_URL=http://100.85.26.99:8000
      - EXPO_PUBLIC_API_TIMEOUT=10000
    volumes:
      - ./mobile:/app
      - /app/node_modules   # prevent host node_modules override

volumes:
  pgdata:
