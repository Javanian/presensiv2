services:
  db:
    image: pgvector/pgvector:pg16
    container_name: presensiv2_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: presensiv2
      POSTGRES_PASSWORD: presensiv2pass
      POSTGRES_DB: presensiv2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presensiv2 -d presensiv2"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: presensiv2_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
